name: Verify container starts
description: Runs a container and checks that it stays running
inputs:
  image:
    required: true
  port:
    required: false
    default: "8000"
  container-name:
    required: false
    default: svc-ci
  wait-seconds:
    required: false
    default: "15"

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        NAME="${{ inputs.container-name }}"
        PORT="${{ inputs.port }}"
        WAIT="${{ inputs.wait-seconds }}"

        docker rm -f "$NAME" >/dev/null 2>&1 || true
        docker run -d --name "$NAME" -p "${PORT}:${PORT}" "${{ inputs.image }}"

        echo "Waiting ${WAIT}s to ensure container stays up..."
        sleep "${WAIT}"

        if ! docker ps --format '{{.Names}}' | grep -qx "$NAME"; then
          echo "Container exited during startup"
          echo "=== docker ps -a ==="
          docker ps -a
          echo "=== logs ==="
          docker logs "$NAME" || true
          exit 1
        fi

        echo "Container is running ✅"
        docker rm -f "$NAME" >/dev/null 2>&1 || true
