name: Build Image

on:
  workflow_dispatch:
  push:
    branches: [ main, test, dev ]

env:
  DEV_IMAGE_TAG: latest
  TEST_IMAGE_TAG: rc
  MAIN_IMAGE_TAG: stable

  HEALTH_PORT: "8000"
  HEALTH_URL: "http://127.0.0.1:8000/healthcheck"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute image repo (lowercase)
        shell: bash
        run: |
          echo "IMAGE_REPO=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Compute tags
        shell: bash
        run: |
          echo "TIMESTAMP_TAG=$(date -u +'%Y.%m.%d')" >> $GITHUB_ENV
          echo "COMMIT_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set branch tag
        uses: iamtheyammer/branch-env-vars@v1.2.2
        with:
          IMAGE_TAG: |
            main:${{ env.MAIN_IMAGE_TAG }}
            test:${{ env.TEST_IMAGE_TAG }}
            dev:${{ env.DEV_IMAGE_TAG }}

      - name: Build image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .deployment/Dockerfile
          load: true
          tags: |
            local/webapi:ci
          build-args: |
            APP_RELEASE=${{ env.TIMESTAMP_TAG }}-${{ env.IMAGE_TAG }}

      - name: Verify service
        uses: ./.github/actions/verify
        with:
          image: local/webapi:ci
          port: ${{ env.HEALTH_PORT }}
          health-url: ${{ env.HEALTH_URL }}
          container-name: webapi-ci

      - name: Push image to GHCR
        uses: QliqyService/deployment/.deployment/.github/actions/build@main
        with:
          image: ${{ env.IMAGE_REPO }}
          image-tag: ${{ env.IMAGE_TAG }}
          commit-tag: ${{ env.COMMIT_TAG }}
          image-timestamp-tag: ${{ env.TIMESTAMP_TAG }}-${{ env.IMAGE_TAG }}
          context: .
          dockerfile: .deployment/Dockerfile
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          build-args: |
            APP_RELEASE=${{ env.TIMESTAMP_TAG }}-${{ env.IMAGE_TAG }}
