{% extends "base.html" %}

{% block content %}
<h1>Редактировать форму</h1>

<form method="post">
    <div>
        <label>Название формы</label><br>
        <input
            type="text"
            name="title"
            maxlength="128"
            required
            value="{{ form.title }}"
        />
    </div>

    <div style="margin-top: 12px;">
        <label>Описание</label><br>
        <textarea
            name="description"
            maxlength="256"
            rows="4"
        >{{ form.description if form.description else '' }}</textarea>
    </div>

    <div style="margin-top: 16px;">
        <button type="submit">Сохранить</button>
        <a href="forms">Отмена</a>
    </div>
</form>
{% endblock %}
